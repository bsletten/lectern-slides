name: Release

# Publishes lectern-slides to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token secret required. Configure
# the trusted publisher once at https://pypi.org/manage/account/publishing/ with:
#   owner=bsletten  repo=lectern-slides  workflow=release.yml  environment=pypi
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build distributions
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # This job only runs `uv publish` — no deps to resolve and no lockfile
          # checked out, so caching is pointless and just warns about no match.
          enable-cache: false
      - name: Publish
        run: uv publish
